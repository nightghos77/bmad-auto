name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: bmad-autopilot/package-lock.json

      - name: Install dependencies
        working-directory: bmad-autopilot
        run: npm ci

      - name: Type check
        working-directory: bmad-autopilot
        run: npx tsc --noEmit

      - name: Build
        working-directory: bmad-autopilot
        run: npm run build

      - name: Test
        working-directory: bmad-autopilot
        run: npm test
